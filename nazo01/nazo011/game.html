<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>nazo01</title>

<style>

body{
    max-width:700px;
    margin:auto;
    padding:2rem;
    font-family:sans-serif;
}

#questionNumber{
    font-size:1.2rem;
    margin-bottom:1rem;
}

#question{
    font-size:1.5rem;
    margin-bottom:2rem;
}

input{
    width:100%;
    padding:10px;
    font-size:1rem;
}

button{
    margin-top:1rem;
    padding:10px 20px;
}

#result{
    margin-top:2rem;
    font-size:1.3rem;
    font-weight:bold;
}

</style>
</head>
<body>

<h1>nazo01</h1>

<div id="questionNumber"></div>

<div id="question"></div>

<input
    type="text"
    id="answer"
    placeholder="ひらがなで入力">

<button id="nextButton">
    決定
</button>

<div id="result"></div>

<script>

const questionPool = [

{q:"隙屋気",a:"すきやき"},
{q:"場場露亜",a:"ばばろあ"},
{q:"肘来",a:"ひじき"},
{q:"多真似疑",a:"たまねぎ"},
{q:"尾村椅子",a:"おむらいす"},
{q:"渡亜芽",a:"わたあめ"},
{q:"絵素軽誤",a:"えすかるご"},
{q:"位名梨図市",a:"いなりずし"},
{q:"気無知",a:"きむち"},
{q:"球誤可毛誤半",a:"たまごかけごはん"},
{q:"絵微譜雷",a:"えびふらい"},
{q:"優位痛目",a:"やさいいため"},
{q:"喫寝宇丼",a:"きつねうどん"},
{q:"空阿下",a:"からあげ"}

];
const questions=
    [...questionPool]
    .sort(()=>Math.random()-0.5)
          .slice(0,10);
    
let current = 0;
const answers = [];

function showQuestion(){

    document.getElementById("questionNumber").textContent =
        `第${current+1}問`;

    document.getElementById("question").textContent =
        questions[current].q;

    document.getElementById("answer").value = "";

    if(current === 9){
        document.getElementById("nextButton").textContent =
            "回答を送信し結果を見る";
    }
}

showQuestion();

document.getElementById("nextButton")
.addEventListener("click",()=>{

    answers.push(
        document.getElementById("answer")
        .value
        .trim()
    );

    if(current < 9){

        current++;
        showQuestion();

    }else{

        let score = 0;

        for(let i=0;i<10;i++){

            if(
                answers[i] === questions[i].a
            ){
                score++;
            }
        }

        document.body.innerHTML = `
            <h1>結果</h1>
            <p>10問中 ${score} 問正解！</p>
            <button onclick="location.href='../index.html'">
                作品一覧へ戻る
            </button>
        `;
    }
});

</script>

</body>
</html>
