<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>nazo01</title>

<style>

body{
    max-width:700px;
    margin:auto;
    padding:2rem;
    font-family:sans-serif;
}

#questionNumber{
    font-size:1.2rem;
    margin-bottom:1rem;
}

#question{
    font-size:1.5rem;
    margin-bottom:2rem;
}

input{
    width:100%;
    padding:10px;
    font-size:1rem;
}

button{
    margin-top:1rem;
    padding:10px 20px;
}

#result{
    margin-top:2rem;
    font-size:1.3rem;
    font-weight:bold;
}

</style>
</head>
<body>

<h1>nazo01</h1>

<div id="questionNumber"></div>

<div id="question"></div>

<input
    type="text"
    id="answer"
    placeholder="ひらがなで入力">

<button id="nextButton">
    決定
</button>

<div id="result"></div>

<script>

const questions = [

{
    q:"日本の首都は？",
    a:"とうきょう"
},

{
    q:"りんごの色は？",
    a:"あか"
},

{
    q:"1年は何ヶ月？",
    a:"じゅうに"
},

{
    q:"富士山がある都道府県の一つ",
    a:"しずおか"
},

{
    q:"犬の鳴き声",
    a:"わんわん"
},

{
    q:"春の次の季節",
    a:"なつ"
},

{
    q:"日本の通貨",
    a:"えん"
},

{
    q:"空に浮かぶ白いもの",
    a:"くも"
},

{
    q:"夜に見える衛星",
    a:"つき"
},

{
    q:"海の水の味",
    a:"しおからい"
}

];

let current = 0;
const answers = [];

function showQuestion(){

    document.getElementById("questionNumber").textContent =
        `第${current+1}問`;

    document.getElementById("question").textContent =
        questions[current].q;

    document.getElementById("answer").value = "";

    if(current === 9){
        document.getElementById("nextButton").textContent =
            "回答を送信し結果を見る";
    }
}

showQuestion();

document.getElementById("nextButton")
.addEventListener("click",()=>{

    answers.push(
        document.getElementById("answer")
        .value
        .trim()
    );

    if(current < 9){

        current++;
        showQuestion();

    }else{

        let score = 0;

        for(let i=0;i<10;i++){

            if(
                answers[i] === questions[i].a
            ){
                score++;
            }
        }

        document.body.innerHTML = `
            <h1>結果</h1>
            <p>10問中 ${score} 問正解！</p>
            ../index.html
                作品一覧へ戻る
            </button>
        `;
    }
});

</script>

</body>
</html>
