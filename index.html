<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナゾトキボクジョー</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
    background: #f7f7f7;
    color: #222;
}

header {
    text-align: center;
    margin-bottom: 3rem;
}

h1 {
    margin-bottom: 0.5rem;
}

.subtitle {
    color: #666;
}

.works {
    display: grid;
    gap: 1rem;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.card h2 {
    margin-top: 0;
}

.info {
    color: #666;
    margin-bottom: 1rem;
}

.play-button {
    display: inline-block;
    padding: 0.7rem 1.2rem;
    background: #0078d4;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.2s;
}

.play-button:hover {
    background: #005ea6;
}

footer {
    text-align: center;
    margin-top: 3rem;
    color: #666;
    font-size: 0.9rem;
}
</style>
</head>

<body>

<header>
    <h1>ナゾトキボクジョー</h1>
    <p class="subtitle">
        ブラウザで遊べるWeb謎を公開しています。
    </p>
</header>

<main class="works">

    <section class="card">
        <h2>消えた研究ノート</h2>
        <div class="info">
            難易度：★★☆☆☆<br>
            想定時間：10〜15分
        </div>
        <p>
            ある研究室からノートが消えた。
            手がかりを集めて真相を突き止めよう。
        </p>
        <a href="./nazo01/" class="play-button">
            ▶ プレイする
        </a>
    </section>

    <section class="card">
        <h2>深夜の図書館</h2>
        <div class="info">
            難易度：★★★☆☆<br>
            想定時間：20〜30分
        </div>
        <p>
            閉館後の図書館で起きた不思議な出来事。
        </p>
        <a href="./nazo02/" class="playsection class="card">
        <h2>coming soon...</h2>
        <div class="info">
            新作準備中
        </div>
    </section>

</main>

<footer>
    © Tikurin
</footer>

</body>
</html>
